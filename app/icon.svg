<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="50%" stop-color="#FF4081" />
      <stop offset="100%" stop-color="#7C4DFF" />
    </linearGradient>
    <!-- Left Chevron Gradient -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#FF4081" />
    </linearGradient>
    <!-- Right Chevron Gradient -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4081" />
      <stop offset="100%" stop-color="#7C4DFF" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Box -->
  <rect x="6" y="6" width="88" height="88" rx="26" fill="#030008" stroke="url(#borderGrad)" stroke-width="4.5" />
  
  <!-- Inner Chevrons -->
  <path d="M 58 29 L 36 50 L 58 71" fill="none" stroke="url(#leftGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 42 29 L 64 50 L 42 71" fill="none" stroke="url(#rightGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
</svg>
